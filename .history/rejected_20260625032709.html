<div id="rejected-container"></div>
<div id="empty-state" class="bg-base-100 mt-[16px] h-[400px]">

    <div class="pt-[111px] pl-[505px] " >
    <img src="/jobs.png" alt="" >
    
    
    </div>
    <div>
        <h2 class=" pl-[490px] font-bold">No jobs available</h2>
        <p class="pl-[420px]">Check back soon for new job opportunities</p>
    </div>
</div>


</body>

<script>

  const rejectedJobs= JSON.parse(localStorage.getItem("rejectedJobs"))||[];

  const container =document.getElementById('rejected-container');
  const emptyState=document.getElementById('empty-state');

  if(rejectedJobs.length===0){
    emptyState.style.display="block";
  }else{
    emptyState.style.display="none";
    rejectedJobs.forEach(function(job){

      container.innerHTML+=`<div class="card card-border bg-base-100 w-[1170px] mt-[16px]">
        <div class="card-body"> 
          
          <h2 class="card-title">${job.company}</h2>
          <p classs="text-gray-500">${job.title}</p>
          <div class="text-gray-500 flex gap-2">
            <p>${job.location}</p>
            <p>${job.type}</p>
            <p>${job.salary}</p>


            
            </div> <button class="btn btn-error w-32">
            REJECTED
        </button>

      
        <div class="flex gap-2">

            <button
                class="btn btn-primary"
                onclick="moveToInterview(${job.id})">
                Interview
            </button>

            <button
                class="btn btn-error">
                Rejected
            </button>
            </div>
        
        </div>`

    })
  }

document.getElementById("counting").innerText =
(JSON.parse(localStorage.getItem("interviewJobs")) || []).length;

document.getElementById("counter").innerText =
(JSON.parse(localStorage.getItem("rejectedJobs")) || []).length;
 
</script>
<script src="script/action.js"></script>
<script>
  document.getElementById("job-count").innerText =
    rejectedJobs.length;
</script>
</html>
